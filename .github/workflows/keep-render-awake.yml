name: Keep Render Awake

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

jobs:
  ping-service:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Render health endpoint
        env:
          KEEP_ALIVE_BASE_URL: https://bugsense-ujif.onrender.com
        run: |
          curl --fail --silent --show-error \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 15 \
            --max-time 120 \
            "${KEEP_ALIVE_BASE_URL}/health" > /dev/null
