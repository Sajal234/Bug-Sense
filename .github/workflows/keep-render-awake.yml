name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-service:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Render homepage and health endpoint
        env:
          KEEP_ALIVE_BASE_URL: https://bugsense-ujif.onrender.com
        run: |
          for endpoint in "/" "/health"; do
            curl --fail --silent --show-error \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 15 \
              --max-time 120 \
              "${KEEP_ALIVE_BASE_URL}${endpoint}" > /dev/null
          done
